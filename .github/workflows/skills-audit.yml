name: Skills Audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    name: Validate skill catalog/frontmatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run audit
        run: make audit
